    <style>
        /* さささんの美学：ライトブルー（ソニックブルー風）のカラーパレット */
        body {
            background-color: #f0f8ff; /* 清潔感のあるアリスブルー */
            color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px; /* スマホで一番美しく見える横幅に最適化 */
            margin: 0 auto;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        h1 {
            color: #4ba3e3; /* 魂のライトブルー */
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        h2 {
            font-size: 1.1rem;
            color: #666;
            margin: 5px 0;
            font-weight: normal;
        }
        p {
            line-height: 1.6;
            color: #666;
        }

        /* ジャケット写真をスマホに最適化するスタイル */
        .jacket {
            width: 100%;
            max-width: 280px; /* スマホでちょうどいいサイズ */
            height: auto;
            border-radius: 12px; /* 角をちょっと丸くして今っぽく */
            box-shadow: 0 12px 28px rgba(75, 163, 227, 0.15); /* ライトブルーの影をデプロイ */
            margin: 20px 0;
        }

        /* 🟩 トラックリスト全体のデザイン（野暮ったさの排除） */
        .track-list {
            text-align: left;
            margin: 25px 0;
            background: #fdfdfd;
            border-radius: 12px;
            border: 1px solid #eef4f8;
            padding: 10px;
        }

        /* 1曲ごとのコンポーネント */
        .track-item {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f6fa;
        }
        .track-item:last-child {
            border-bottom: none; /* 最後の曲の線は消す */
        }
        .track-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: #444;
            margin: 0 0 8px 5px;
        }

        /* 🟩 オーディオプレイヤーの幅を100%にしてスマートに馴染ませる */
        .audio-player {
            width: 100%;
            height: 32px; /* 高さを絞ってコンパクト＆ミニマルに */
            outline: none;
        }
