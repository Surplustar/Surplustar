<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surplustar DEMO Album 「nine ball」特設サイト</title>
    <style>
        /* さささんの美学：ライトブルー（ソニックブルー風）のカラーパレット */
        body {
            background-color: #f0f8ff; /* 清潔感のあるアリスブルー */
            color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #4ba3e3; /* 魂のライトブルー */
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #4ba3e3;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #3582b8;
        }

        /* ジャケット写真をスマホに最適化するスタイル */
        .jacket {
            width: 100%;
            max-width: 300px; /* スマホでちょうどいいサイズ */
            height: auto;
            border-radius: 8px; /* 角をちょっと丸くして今っぽく */
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); /* 影をつけて立体感をデプロイ */
            margin: 20px 0;
        }

        /* プレイヤー全体の囲み */
        .player-container {
            background-color: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
        }

        /* オーディオプレイヤーの幅を100%にしてスマホにフィット */
        .audio-player {
            width: 100%;
            margin-top: 5px;
        }        
    </style>
    
</head>
<body>
    <div class="container">
        <h1>Surplustar DEMO Album 「nine ball」特設サイト</h1>
        <h2>閲覧ありがとうございます。</h2>
        <h2>以下から曲を聴いてください！</h2>
        
        <img src="DEMO_ジャケット_20260524.jpg" alt="Surplustar Jacket" class="jacket">

        <div class="player-container">
            <p style="font-weight: bold; margin-bottom: 5px;">1.真象生命</p>
            <audio controls src="真象生命_Ver1227.mp3" class="audio-player">
                お使いのブラウザはオーディオ再生に対応していません。
            </audio>
        </div>
        <p>
            1.inst<br>
            2.張りぼてのアルメリア<br>
            3.真象生命<br>
       </p>
        
        <a href="https://x.com/Amariboshi" target="_blank" rel="noopener noreferrer" class="btn" >Surplustar 公式Xはこちら &#x2197;</a>
    </div>
</body>
</html>
