<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surplustar CD Special Page</title>
    <style>
        /* さささんの美学：ライトブルー（ソニックブルー風）のカラーパレット */
        body {
            background-color: #f0f8ff; /* 清潔感のあるアリスブルー */
            color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #4ba3e3; /* 魂のライトブルー */
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #4ba3e3;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #3582b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Surplustar</h1>
        <p>CDをご購入いただきありがとうございます！</p>
        <p>ここは、あの3ピースロックバンド「サプラスタ」が<br>
        葛西の秘密基地から0円インフラでデプロイした特設サイトです。</p>
        
        <a href="https://twitter.com/（バンドのSNSとか）" class="btn">最新情報をチェックする</a>
    </div>
</body>
</html>
